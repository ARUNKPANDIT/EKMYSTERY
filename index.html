<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK MYSTERY - Official App</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CSS Reset */
        * { box-sizing: border-box; }
        body { background: #0a0a12; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 70px; }

        /* --- FIXED NAVBAR (Sabse Upar) --- */
        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 20px; border-bottom: 2px solid #00d4ff; 
            z-index: 10005; /* Isko sabse upar rakha hai */
        }
        .navbar .logo { color: #00d4ff; font-weight: bold; font-size: 1.4rem; letter-spacing: 1px; }
        
        /* ☰ Menu Icon Button */
        .menu-toggle { 
            color: #00d4ff; font-size: 28px; cursor: pointer; 
            background: none; border: none; outline: none; padding: 5px;
        }

        /* --- SIDE DRAWER (Left Se Khulne Wala) --- */
        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #111; border-right: 2px solid #00d4ff;
            transition: 0.4s ease; z-index: 10006; padding-top: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .side-menu.active { left: 0; } /* Jab click hoga tab ye active hoga */

        .side-menu .close-btn { 
            text-align: right; padding: 10px 20px; color: #ff3333; 
            font-size: 20px; cursor: pointer; font-weight: bold;
        }
        .side-menu a { 
            display: block; padding: 15px 25px; color: #fff; 
            text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid #222; 
        }
        .side-menu a:hover { background: #00d4ff; color: #000; }

        /* Overlay (Jab menu khule toh piche ka dhundla ho jaye) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 10004;
        }
        .overlay.active { display: block; }

        /* Content Container */
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .post-card { background: #12121f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        h2 { color: #fff; margin-top: 0; }
        .read-more-btn { background: #00d4ff; color: #000; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }

        /* AI Launcher */
        #ai-launcher { position: fixed; bottom: 20px; right: 20px; background: #00d4ff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; cursor: pointer; font-size: 25px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">EK MYSTERY</div>
        <button class="menu-toggle" onclick="openMenu()">
            <i class="fas fa-bars"></i> </button>
    </div>

    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <div id="sideMenu" class="side-menu">
        <div class="close-btn" onclick="closeMenu()">✕ CLOSE</div>
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #333;">
            <img src="https://cdn-icons-png.flaticon.com/512/1155/1155026.png" width="80" alt="logo">
            <p style="color:#00d4ff; font-weight:bold;">EK MYSTERY AI</p>
        </div>
        <a href="#"><i class="fas fa-home"></i> Home</a>
        <a href="#"><i class="fas fa-bolt"></i> Latest Stories</a>
        <a href="#"><i class="fas fa-video"></i> Videos</a>
        <a href="#"><i class="fas fa-info-circle"></i> About</a>
        <a href="#"><i class="fas fa-envelope"></i> Contact</a>
    </div>

    <div class="container" id="post-container">
        Loading Mystery Content...
    </div>

    <div id="ai-launcher">🤖</div>

<script>
    // Menu Functions
    function openMenu() {
        document.getElementById('sideMenu').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }

    function closeMenu() {
        document.getElementById('sideMenu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    // Sheet Data Logic (Same as before)
    const SHEET_ID = '1Zzpp8OTfcvXgTKuBHfmTCzEb0k690P5EcBFmMozAQ6o';
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function loadData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const posts = json.table.rows;
            let html = '';
            
            posts.forEach((row, index) => {
                const topic = row.c[0]?.v || '';
                const desc = row.c[1]?.v || '';
                const status = row.c[5]?.v || '';

                if (status.toLowerCase() === 'live') {
                    html += `
                    <div class="post-card">
                        <h2>${topic}</h2>
                        <p>${desc}</p>
                        <button class="read-more-btn">Read Full Blog</button>
                    </div>`;
                }
            });
            document.getElementById('post-container').innerHTML = html;
        } catch (e) { console.error(e); }
    }
    loadData();
</script>
</body>
</html>
