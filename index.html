<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK MYSTERY - Official & AI Assistant</title>
    
    <style>
        /* --- GLOBAL & CLEANUP --- */
        font, span, .goog-text-highlight { background: transparent !important; box-shadow: none !important; border: none !important; }
        #goog-gt-tt, .goog-te-banner-frame { display: none !important; }
        body { background: #0a0a12; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; top: 0 !important; overflow-x: hidden; }
        
        /* --- HEADER --- */
        header { background: #000; padding: 25px; text-align: center; border-bottom: 3px solid #00d4ff; }
        header h1 { color: #00d4ff; margin: 0; letter-spacing: 3px; text-transform: uppercase; font-size: 2rem; }
        
        #google_translate_element { text-align: center; padding: 10px; background: #111; }

        /* --- FILTERS --- */
        .filter-container { text-align: center; margin: 15px 0; }
        .filter-btn { background: #161625; border: 1px solid #333; color: #888; padding: 8px 18px; margin: 4px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        
        /* --- MAIN CONTAINER --- */
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .post-card { background: #12121f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; position: relative; }
        h2 { margin: 10px 0; color: #fff; }
        .description { color: #ffcc00; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; display: block; }

        /* --- BLOG CONTENT (WHITE BACKGROUND) --- */
        .blog-content { 
            display: none; 
            margin-top: 20px; 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 30px; 
            border-radius: 8px; 
            line-height: 1.8; 
            font-size: 1.15rem; 
            white-space: pre-wrap; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        
        .blog-content b, .blog-content strong {
            color: #b30000 !important;
            display: block;
            margin-top: 20px;
            font-size: 1.4rem;
            border-left: 5px solid #b30000;
            padding-left: 10px;
        }

        .read-more-btn { background: #00d4ff; color: #000; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }

        /* --- IMPRESSION BUTTONS STYLE --- */
        .impression-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .imp-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333;
        }
        .imp-btn:hover { background: #00d4ff; color: #000; border-color: #00d4ff; }
        .imp-btn span { font-size: 18px; }

        /* --- AI CHATBOT --- */
        #ai-app-launcher { position: fixed; bottom: 20px; left: 20px; background: #00d4ff; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 5px 20px rgba(0,212,255,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10001; }
        #ai-window { position: fixed; bottom: 90px; left: 20px; width: 320px; height: 450px; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; flex-direction: column; overflow: hidden; z-index: 10000; border: 2px solid #00d4ff; }
        .ai-header { background: #00d4ff; padding: 15px; color: #000; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f4f4f4; display: flex; flex-direction: column; gap: 10px; color: #333; }
        .ai-input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 5px; background: #fff; }
        .ai-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        .ai-input-area button { background: #00d4ff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        footer { text-align: center; padding: 30px; color: #444; }
    </style>
</head>
<body>

<header><h1>EK MYSTERY</h1></header>
<div id="google_translate_element"></div>

<div class="filter-container">
    <button class="filter-btn active" onclick="applyFilter('all', this)">All</button>
    <button class="filter-btn" onclick="applyFilter('Blog', this)">Blog</button>
    <button class="filter-btn" onclick="applyFilter('Video', this)">Video</button>
    <button class="filter-btn" onclick="applyFilter('News', this)">News</button>
</div>

<div class="container" id="post-container">Data Loading...</div>

<div id="ai-app-launcher" onclick="toggleChat()">🤖</div>
<div id="ai-window">
    <div class="ai-header">
        <span>MYSTERY AI</span>
        <span onclick="toggleChat()" style="cursor:pointer">×</span>
    </div>
    <div id="chat-messages">
        <div style="background:#e1f5fe; padding:10px; border-radius:10px; align-self:flex-start;">Oye Dakkan! Kuch rahasya jaan-na hai?</div>
    </div>
    <div class="ai-input-area">
        <input type="text" id="user-ai-input" placeholder="Type here...">
        <button onclick="sendAiMessage()">Bhejo</button>
    </div>
</div>

<div id="universal-disqus" style="display:none; margin-top:20px; padding: 15px; background: #fff; border-radius: 8px;">
    <div id="disqus_thread"></div>
</div>

<footer>&copy; 2026 EK MYSTERY</footer>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'hi', autoDisplay: false}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    const SHEET_ID = '1Zzpp8OTfcvXgTKuBHfmTCzEb0k690P5EcBFmMozAQ6o';
    const G_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let postsData = [];

    async function loadData() {
        try {
            const res = await fetch(G_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            postsData = json.table.rows;
            applyFilter('all');
        } catch (e) { document.getElementById('post-container').innerHTML = "Error: " + e; }
    }

    function toggleChat() {
        const win = document.getElementById('ai-window');
        win.style.display = (win.style.display === "none" || win.style.display === "") ? "flex" : "none";
    }

    function sendAiMessage() {
        const input = document.getElementById('user-ai-input');
        const msgArea = document.getElementById('chat-messages');
        if (!input.value.trim()) return;

        let uMsg = document.createElement('div');
        uMsg.style = "background:#00d4ff; color:#000; padding:10px; border-radius:10px; align-self:flex-end; max-width:80%; font-size:14px;";
        uMsg.innerText = input.value;
        msgArea.appendChild(uMsg);

        setTimeout(() => {
            let aMsg = document.createElement('div');
            aMsg.style = "background:#e1f5fe; color:#333; padding:10px; border-radius:10px; align-self:flex-start; max-width:80%; font-size:14px;";
            aMsg.innerText = "Abhi dimaag load ho raha hai, tab tak blog padh le fufa!";
            msgArea.appendChild(aMsg);
            msgArea.scrollTop = msgArea.scrollHeight;
        }, 800);
        input.value = "";
        msgArea.scrollTop = msgArea.scrollHeight;
    }

    function applyFilter(category, btnElement) {
        if (btnElement) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }
        const container = document.getElementById('post-container');
        let html = '';
        postsData.forEach((row, index) => {
            const topic = row.c[0]?.v || '';
            const desc = row.c[1]?.v || '';
            const link = row.c[2]?.v || '';
            const blogText = row.c[3]?.v || '';
            const type = row.c[4]?.v || 'Blog';
            const status = row.c[5]?.v || '';

            if (status && status.toString().toLowerCase() === 'live') {
                if (category === 'all' || type.toLowerCase() === category.toLowerCase()) {
                    let vId = link ? link.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#\&\?]*)/) : null;
                    let videoHtml = vId ? `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin:15px 0;"><iframe style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" src="https://www.youtube.com/embed/${vId[1]}" allowfullscreen></iframe></div>` : '';

                    html += `
                        <div class="post-card">
                            <span style="color:#00d4ff; font-size:12px; font-weight:bold;">${type}</span>
                            <h2>${topic}</h2>
                            <div class="description">${desc}</div>
                            ${videoHtml}
                            ${blogText ? `
                                <button class="read-more-btn" id="btn-${index}" onclick="toggleBlog(${index}, '${topic.replace(/'/g, "\\'")}')">Read Blog</button>
                                <div id="blog-box-${index}" class="blog-content">
                                    <div class="blog-text-area">${blogText}</div>
                                    
                                    <div class="impression-container">
                                        <button class="imp-btn" onclick="alert('Mast!')"><span>🔥</span> Mast</button>
                                        <button class="imp-btn" onclick="alert('Shocking!')"><span>😱</span> Shocking</button>
                                        <button class="imp-btn" onclick="alert('Gyaan!')"><span>🧠</span> Gyaan Mila</button>
                                    </div>

                                    <div id="disqus-placeholder-${index}" style="margin-top:20px;"></div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            }
        });
        container.innerHTML = html || "<p style='text-align:center;'>No Data Found!</p>";
    }

    function toggleBlog(index, title) {
        const content = document.getElementById(`blog-box-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        const disqusHolder = document.getElementById('universal-disqus');
        const placeholder = document.getElementById(`disqus-placeholder-${index}`);

        if (content.style.display === "block") {
            content.style.display = "none"; btn.innerText = "Read Blog";
            disqusHolder.style.display = "none";
        } else {
            content.style.display = "block"; btn.innerText = "Close Blog";
            placeholder.appendChild(disqusHolder);
            disqusHolder.style.display = "block";
            if (typeof DISQUS !== 'undefined') {
                DISQUS.reset({ reload: true, config: function () { this.page.identifier = 'blog-' + index; this.page.title = title; } });
            } else {
                var d = document, s = d.createElement('script'); s.src = 'https://ek-mystery.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date()); (d.head || d.body).appendChild(s);
            }
        }
    }
    loadData();
</script>
</body>
</html>
